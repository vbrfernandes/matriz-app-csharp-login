<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Recuperar Senha - Matriz de Eisenhower</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="logo">
        <h2>Matriz de Eisenhower</h2>
    </div>
    <div class="login-container quadrant">
        <div class="login-header">
            <h2>Recuperar Senha</h2>
            <p class="subtitle">Enviaremos um link para redefinir sua senha</p>
        </div>
        <form class="login-form" id="formEsqueceuSenha">
            <div class="input-group-vertical">
                <label for="email">E-mail cadastrado</label>
                <input type="email" id="email" class="task-input"
                    placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="login-btn">Enviar link de
                recuperação</button>
        </form>
        <div class="login-footer">
            <p class="register-text">Lembrou a senha? <a
                    href="../index.html">Voltar para o login</a></p>
        </div>
    </div>
    <div id="toast" class="toast">Se o e-mail existir na nossa base, um link foi enviado!</div>
     <script type="module" src="../js/controller/authController.js"></script>
</body>
</html>
