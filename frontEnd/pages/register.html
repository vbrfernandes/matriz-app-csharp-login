<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre-se - Matriz de Eisenhower</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="logo">
        <a href="../index.html"><h2>Matriz de Eisenhower</h2></a>
    </div>

    
    <div class="login-container quadrant">
        <div class="login-header">
            <h2>Criar Conta</h2>
            <p class="subtitle">Junte-se a nós e organize seu dia</p>
        </div>

        <form class="login-form" action="login.html">
            <div class="input-group-vertical">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" class="task-input" placeholder="Seu nome" required>
            </div>

            <div class="input-group-vertical">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="task-input" placeholder="seu@email.com" required>
            </div>

            <div class="input-group-vertical">
                <label for="password">Senha</label>
                <input type="password" id="password" class="task-input" placeholder="Crie uma senha forte" required>
            </div>

            <div class="input-group-vertical">
                <label for="confirm-password">Confirmar Senha</label>
                <input type="password" id="confirm-password" class="task-input" placeholder="Repita a senha" required>
            </div>

            <button type="submit" class="login-btn">Registrar</button>
        </form>

        <div class="login-footer">
            <p class="register-text">Já tem uma conta? <a href="login.html">Faça login</a></p>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
