<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Matriz de Eisenhower</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="logo">
        <a href="../index.html"><h2>Matriz de Eisenhower</h2></a>
    </div>
    <div class="login-container quadrant">
        <div class="login-header">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Faça login para gerenciar suas tarefas</p>
        </div>
        <form class="login-form" action="index.html">
            <div class="input-group-vertical">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="task-input"
                    placeholder="seu@email.com" required>
            </div>
            <div class="input-group-vertical">
                <label for="password">Senha</label>
                <input type="password" id="password" class="task-input"
                    placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
        <div class="login-footer">
            <a href="esqueceuSenha.html" class="forgot-link">Esqueceu a senha?</a>
            <p class="register-text">Não tem uma conta? <a
                    href="register.html">Registre-se</a></p>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
